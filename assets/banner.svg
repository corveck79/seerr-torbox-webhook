<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a2236"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Background mycelium pattern -->
  <g stroke="#22d3ee" stroke-width="0.8" opacity="0.15" fill="none">
    <line x1="0"   y1="100" x2="200" y2="60"/>
    <line x1="0"   y1="100" x2="200" y2="140"/>
    <line x1="200" y1="60"  x2="400" y2="30"/>
    <line x1="200" y1="140" x2="400" y2="170"/>
    <line x1="400" y1="30"  x2="600" y2="60"/>
    <line x1="400" y1="170" x2="600" y2="140"/>
    <line x1="600" y1="60"  x2="800" y2="100"/>
    <line x1="600" y1="140" x2="800" y2="100"/>
    <line x1="200" y1="60"  x2="400" y2="170"/>
    <line x1="200" y1="140" x2="400" y2="30"/>
    <line x1="400" y1="30"  x2="600" y2="140"/>
    <line x1="400" y1="170" x2="600" y2="60"/>
  </g>
  <g opacity="0.4">
    <circle cx="0"   cy="100" r="3" fill="#22d3ee"/>
    <circle cx="200" cy="60"  r="3" fill="#22d3ee"/>
    <circle cx="200" cy="140" r="3" fill="#22d3ee"/>
    <circle cx="400" cy="30"  r="3" fill="#5eead4"/>
    <circle cx="400" cy="170" r="3" fill="#5eead4"/>
    <circle cx="600" cy="60"  r="3" fill="#22d3ee"/>
    <circle cx="600" cy="140" r="3" fill="#22d3ee"/>
    <circle cx="800" cy="100" r="3" fill="#22d3ee"/>
  </g>

  <!-- Centred logo -->
  <g transform="translate(220, 60)">
    <circle cx="40" cy="40" r="60" fill="url(#glow)"/>
    <g stroke="#22d3ee" stroke-width="1.8" opacity="0.7" fill="none">
      <line x1="20" y1="40" x2="60" y2="20"/>
      <line x1="20" y1="40" x2="60" y2="60"/>
      <line x1="60" y1="20" x2="60" y2="60"/>
      <line x1="40" y1="10" x2="20" y2="40"/>
      <line x1="40" y1="70" x2="20" y2="40"/>
      <line x1="40" y1="10" x2="60" y2="20"/>
      <line x1="40" y1="70" x2="60" y2="60"/>
    </g>
    <circle cx="20" cy="40" r="5.5" fill="#0d9488"/>
    <circle cx="60" cy="20" r="4.5" fill="#22d3ee"/>
    <circle cx="60" cy="60" r="4.5" fill="#22d3ee"/>
    <circle cx="40" cy="10" r="3.5" fill="#5eead4"/>
    <circle cx="40" cy="70" r="3.5" fill="#5eead4"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(330, 90)" font-family="'JetBrains Mono', 'Menlo', monospace">
    <text font-size="48" font-weight="700" fill="#e2e8f0">
      <tspan>myc</tspan><tspan fill="#22d3ee">3</tspan><tspan>l</tspan><tspan fill="#22d3ee">1</tspan><tspan>um</tspan>
    </text>
    <text y="38" font-size="14" fill="#64748b">
      the hidden network beneath your media library
    </text>
  </g>
</svg>
